<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PricePulse</title>
  <!-- popup.css styles the entire popup window -->
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────────────────────── -->
  <!-- Always visible at the top of the popup -->
  <header>
    <span class="logo">💰 PricePulse</span>
  </header>

  <!-- ── Main content area ───────────────────────────────────────────────── -->
  <main>

    <!-- Product bar: shown when a product title was auto-detected on the page.
         Displays the detected title and a refresh button.
         Hidden by default — popup.js shows it if a title is found. -->
    <div id="product-bar" class="hidden">
      <p id="product-name"></p>
      <!-- Clicking ↻ clears the cache and re-fetches live prices -->
      <button id="btn-refresh" title="Refresh">↻</button>
    </div>

    <!-- Manual search bar: always visible so users can search any product
         even if they're not on a product page -->
    <div id="search-bar">
      <input id="search-input" type="text" placeholder="Search a product…" />
      <button id="btn-search">Go</button>
    </div>

    <!-- Loading state: shown while waiting for the backend response.
         Hidden by default — popup.js shows it during API calls. -->
    <div id="state-spinner" class="hidden">
      <div class="spinner"></div>
      <p>Comparing prices…</p>
    </div>

    <!-- Error state: shown when the backend is unreachable or returns an error.
         The error message text is injected by popup.js. -->
    <div id="state-error" class="hidden">
      <p id="error-msg"></p>
    </div>

    <!-- Empty state: shown when the backend returns zero results -->
    <div id="state-empty" class="hidden">
      <p>No results found.</p>
    </div>

    <!-- Results container: popup.js injects product cards here dynamically.
         Empty by default — filled after a successful API response. -->
    <div id="results"></div>

    <!-- Price History -->
    <div id="price-history" class="hidden">
      <h3>Price History</h3>
      <canvas id="price-chart" width="300" height="200"></canvas>
      <div id="price-stats"></div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="services/priceHistoryStorage.js"></script>
  <script src="services/priceTracker.js"></script>
  <script src="popup.js"></script>
</body>
</html>
