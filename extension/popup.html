<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PricePulse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────────────────────── -->
  <header>
    <span class="logo">
      <img src="icons/icon48.png" alt="" class="logo-icon" />
      <span class="logo-text">PricePulse</span>
    </span>
  </header>

  <!-- ── Main content area ───────────────────────────────────────────────── -->
  <main>

    <!-- Product bar: auto-detected product title + refresh button -->
    <div id="product-bar" class="hidden">
      <p id="product-name"></p>
      <button id="btn-refresh" title="Refresh prices">↻</button>
    </div>

    <!-- Manual search bar -->
    <div id="search-bar">
      <input id="search-input" type="text" placeholder="🔍  Search a product…" />
      <button id="btn-search">Search</button>
    </div>

    <!-- Loading state -->
    <div id="state-spinner" class="hidden">
      <div class="spinner"></div>
      <p>Comparing prices…</p>
    </div>

    <!-- Error state -->
    <div id="state-error" class="hidden">
      <p id="error-msg"></p>
    </div>

    <!-- Empty state -->
    <div id="state-empty" class="hidden">
      <p>✦ No results found</p>
    </div>

    <!-- Results container -->
    <div id="results"></div>

    <!-- Price History -->
    <div id="price-history" class="hidden">
      <h3>📈 Price History</h3>
      <canvas id="price-chart" width="300" height="180"></canvas>
      <div id="price-stats"></div>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="services/priceHistoryStorage.js"></script>
  <script src="services/priceTracker.js"></script>
  <script src="popup.js"></script>
</body>
</html>
